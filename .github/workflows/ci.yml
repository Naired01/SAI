name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download modules
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -shuffle=on ./...

      - name: Build server
        run: CGO_ENABLED=0 go build -trimpath -o bin/sai-server ./cmd/server

      - name: Build agent (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o bin/sai-agent-linux-amd64 ./cmd/agent

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: sai-server-linux-amd64
          path: bin/sai-server
          if-no-files-found: error

  frontend:
    name: Web (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: sai-web-dist
          path: web/dist
          if-no-files-found: error